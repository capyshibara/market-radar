ops.agents.pageKicker=How it's made
ops.agents.title=The Newsroom
ops.agents.standfirst=Nine AI agents do the work. One human owns the signature.
ops.agents.legend.code=Code — deterministic, exact, no model
ops.agents.legend.ai=AI — powerful, never trusted alone
ops.agents.legend.human=Human — the final signature
ops.agents.deskTag.gather=Gather
ops.agents.deskTag.understand=Understand
ops.agents.deskTag.guard=Guard
ops.agents.desk1.sub=Bring the market in — safely, once, and without waste.
ops.agents.desk2.sub=Turn articles into evidence, evidence into decisions.
ops.agents.desk3.sub=Nothing publishes because a model said so.
ops.agents.role.scout=Crawls 40+ whitelisted sources — HTTPS-only, SSRF-blocked, size-capped; reads JS-rendered sites through their own JSON APIs.
ops.agents.role.librarian=Spots duplicates before they cost money — normalized hash first, similarity second, AI only for genuine gray zones.
ops.agents.role.router=3-vote self-consistency topic classification; routes each story to the departments it concerns. Disagreement goes to a human, never a guess.
ops.agents.role.researcher=Extracts verbatim evidence spans; long documents are chunked with overlap so every character is read. Five kinds of dates, each grounded in its span.
ops.agents.role.connector=Clusters evidence across documents and months by company, product, event type and geography — corroboration counted in independent sources, structurally.
ops.agents.role.analyst=Writes bilingual decision briefs from gated evidence only; every recommendation is owned by our Product team with a 30–90-day horizon and a stop criterion.
ops.agents.role.editor=Scores materiality against 7 Product intelligence questions; assigns DECISION_READY / WATCH / REJECT. The rubric is code — versioned and testable.
ops.agents.role.factchecker=Rejects any name, date or number not found verbatim in the cited evidence — checked independently in Vietnamese and English. Free, instant, reproducible.
ops.agents.role.verifier=A second, unrelated AI re-checks entailment of every insight — the app refuses to boot if writer and verifier share a model family.
ops.agents.signature.title=+ 1 Human — the signature
ops.agents.signature.desc=A Product SME reviews every edition against a written checklist, with direct citation spot-checks, before anything publishes. And when the evidence is too thin, the report says INSUFFICIENT_EVIDENCE instead of filling the page.

