ops.roleMatrix.descMaker=Runs pipeline jobs (classify/interpret/verify) unsupervised. Can edit a claim's text but never self-approve — hands off to a Checker.
ops.roleMatrix.descChecker=Makes the final call on claims in their department — approve, edit + approve, force-approve (with reason), or reject.
ops.roleMatrix.descAdmin=Full access across every department — pipeline config (Sources, Classifications, Dedup) and every review action.
ops.roleMatrix.descAuditor=Read-only — every department, every page. No action button is ever enabled, even on pages this role can view.
ops.roleMatrix.decisionNote=Design decision: a Maker may edit a claim's text (queuing it) but can never approve their own edit — approval always requires a Checker, preserving the maker/checker separation. On the Review page, an action a role isn't permitted to use still appears but stays locked with a reason — so what is possible is always visible, never mysteriously missing.

