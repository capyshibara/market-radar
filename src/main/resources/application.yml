spring:
  datasource:
    # File-backed (đổi từ in-mem 2026-07-12): restart KHÔNG mất dữ liệu nữa — raw docs,
    # classification, LlmCallLog (replay-cache) đều giữ lại. Demo chạy lại pipeline
    # = replay từ cache, KHÔNG tốn API call, không cần mạng. Backup = copy thư mục ./data.
    url: jdbc:h2:file:./data/marketradar;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true   # /h2-console — chỉ dùng dev/demo, tắt khi deploy thật

marketradar:
  ingest:
    enabled: false          # bật true khi muốn cron chạy thật; demo dùng nút chạy tay /ingest/run
    fixed-delay-ms: 900000  # 15 phút
    max-items-per-source: 25  # cap tin mới nhất mỗi nguồn mỗi lần chạy — chặn feed dump nguyên archive
                              # (FSC_TW ~800 item) làm phình chi phí classify + cặp dedup O(n²)
  llm:
    # Writer (AI#2 extractor + AI#3 interpreter + dedup pairwise).
    # Batch 9 — hai đường, chọn bằng config:
    #   base-url RỖNG  → Anthropic Messages API, key từ env ANTHROPIC_API_KEY (đường cũ)
    #   base-url ĐƯỢC SET → endpoint OpenAI-compat, key từ env WRITER_API_KEY
    #     Gemini:  base-url=https://generativelanguage.googleapis.com/v1beta/openai  model=gemini-2.5-flash
    # KHÔNG hardcode key vào file này.
    base-url: ""
    model: claude-sonnet-4-6      # đổi được; lưu ý model Opus 4.7+ từ chối temperature
    max-tokens: 1024              # nâng từ 300 (batch 3): output interpreter dài hơn classifier
    temperature: 1.0              # cần đa dạng cho self-consistency; để trống nếu model từ chối
    samples: 3                    # N lần gọi độc lập
    min-votes: 2                  # nhãn nhận khi đạt >= 2/3 vote (ngưỡng bảo thủ cố định)
    replay-cache: true            # đọc lại response đã log — fallback "API lỗi giữa demo"
  classifier:                      # AI#1 — bean riêng, mặc định RỖNG = dùng lại writer ở trên (không đổi hành vi cũ)
    # Đây là stage tốn LLM call nhiều nhất khi crawl volume tăng (3x self-consistency/doc) —
    # đổi sang provider rẻ hơn TẠI ĐÂY, không cần sửa code. API key đọc từ env CLASSIFIER_API_KEY.
    # Gợi ý: Qwen-Flash (base-url=https://dashscope-intl.aliyuncs.com/compatible-mode/v1, model=qwen-flash)
    #    hoặc DeepSeek V4 Flash (base-url=https://api.deepseek.com, model=deepseek-chat)
    base-url: ""
    model: ""
    max-tokens: 200
  verifier:                        # Batch 4 — Gate L2: verifier PHẢI khác họ với writer (Invariant #2)
    # API key đọc từ env VERIFIER_API_KEY — không có key → STUB (mọi thứ vào review, không auto-publish)
    # DeepSeek V4 Flash: rẻ (~$0.14/$0.28 mỗi 1M token), khác họ với writer Anthropic, và OpenAI-compat
    # nên cắm thẳng vào base-url/model dưới đây — thay cho placeholder gpt-4o-mini trước đó.
    base-url: https://api.deepseek.com     # endpoint OpenAI-compat; đổi provider = đổi dòng này
    model: deepseek-chat                    # alias tương thích DeepSeek V4 Flash (soát lại nếu deprecate sau 2026-07-24)
    max-tokens: 512
  alert:                           # Batch 5 — Hot Alert (bước 8)
    enabled: true
    # Slack incoming webhook đọc từ env SLACK_WEBHOOK_URL — rỗng → STUB mode:
    # không gọi mạng, alert chỉ ghi vào /alerts (demo offline vẫn xem được nội dung)
    webhook-url: ${SLACK_WEBHOOK_URL:}
    min-tier: T3                   # chỉ tin T3-T4 mới "sốt dẻo"
    base-url: http://localhost:8080  # gốc link "hành động" trong alert
  dedup:                           # Batch 5 — Dedup/Conflict (bước 9)
    window-hours: 72               # chỉ so cặp tài liệu trong cửa sổ 72h
    jaccard-same: 0.90             # >= ngưỡng này → trùng deterministic (không cần LLM)
    jaccard-gray: 0.50             # vùng xám [gray, same) → hỏi LLM pairwise; STUB → chờ người
  fetch:
    connect-timeout-seconds: 5
    request-timeout-seconds: 15
    max-body-bytes: 5242880   # 5 MB — chống tải payload quá cỡ
    https-only: true          # nguồn http thuần sẽ bị từ chối (fail loud, log rõ)

logging:
  level:
    com.marketradar: INFO
