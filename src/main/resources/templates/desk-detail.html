<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{'ops.desks.dept.' + ${dept.name()}}">Desk</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>
  .desk-banner { display:inline-block; margin-bottom:6px; padding:4px 11px; border-radius:6px; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
  .desk-banner[data-dept="PRODUCT"] { background:#EAF0FB; color:#274B8F; }
  .desk-banner[data-dept="SALES"] { background:#FAF0DC; color:#7A5518; }
  .desk-banner[data-dept="COMPLIANCE"] { background:#EAF3EE; color:#1F5A50; }
  .routing-chip { display:inline-block; margin:2px 4px 0 0; padding:2px 8px; border:1px solid var(--border, #E1DDD2); border-radius:9px; font-size:11px; color:var(--text-secondary, #6b6a63); background:var(--surface, #fff); }
  .desk-note { font-size:11.5px; color:var(--text-secondary, #6b6a63); }
</style>
</head>
<body>
<div class="ops-shell">
<th:block th:replace="~{fragments/ops-sidebar :: sidebar('desks', ${queueCount})}"></th:block>
<div class="ops-main">
<div class="ops-content">
  <div class="page-header">
    <div>
      <span class="desk-banner" th:attr="data-dept=${dept.name()}" th:text="#{'ops.desks.dept.' + ${dept.name()}}">Desk</span>
      <h1 th:text="#{ops.desks.detailTitle}">Routed stories</h1>
      <p th:text="#{ops.desks.detailDescription}">Every story below was routed here by the deterministic rule table.</p>
    </div>
    <a class="btn btn-ghost" href="/desks" th:text="#{ops.desks.backToDesks}">← All desks</a>
  </div>

  <div class="empty-state" th:if="${items.isEmpty()}">
    <div class="title" th:text="#{ops.desks.empty}">Nothing routed yet.</div>
  </div>

  <div class="data-table-wrap" th:unless="${items.isEmpty()}"><div class="data-table-scroll">
    <table class="data-table">
      <thead><tr>
        <th th:text="#{ops.desks.colStory}">Story</th>
        <th th:text="#{ops.desks.colPublished}">Published</th>
        <th th:text="#{ops.desks.colRouting}">Routing</th>
        <th th:text="#{ops.desks.colLinks}">Links</th>
      </tr></thead>
      <tbody>
        <tr th:each="item : ${items}">
          <td>
            <div th:text="${item.title}">Title</div>
            <div class="desk-note" th:text="${item.sourceName}">Source</div>
          </td>
          <td th:text="${item.publishedLabel}">01/07/2026</td>
          <td>
            <span class="routing-chip" th:each="label : ${item.labels}" th:text="${label}">LABEL</span>
            <div class="desk-note" th:text="${item.routingNote}">Route note</div>
          </td>
          <td>
            <a th:if="${item.factCode != null}" th:href="${'/report/story/' + item.factCode}"
               th:text="${item.factCode}">F-001</a>
            <a th:if="${item.externalLink}" th:href="${item.url}" target="_blank" rel="noopener"
               th:text="#{ops.desks.openSource}">Source ↗</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div></div>
</div>
</div>
</div>
</body>
</html>
