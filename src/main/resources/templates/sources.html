<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{ops.sources.title}">Source Registry</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
</head>
<body>
<div class="ops-shell">
  <th:block th:replace="~{fragments/ops-sidebar :: sidebar('sources', ${queueCount})}"></th:block>
  <div class="ops-main">
    <div class="ops-content">

      <div id="pipeline-denied" class="empty-state" style="display:none;margin-top:24px">
        <div class="title" th:text="#{ops.sources.deniedTitle}">No access</div>
        <div class="desc" th:text="#{ops.sources.deniedDesc}">Restricted.</div>
      </div>

      <div id="pipeline-content">
        <div class="page-header">
          <div>
            <h1 th:text="#{ops.sources.title}">Source Registry</h1>
            <p th:text="#{ops.sources.description}">description</p>
          </div>
        </div>

        <div class="data-table-wrap"><div class="data-table-scroll">
          <table class="data-table">
            <thead><tr>
              <th th:text="#{ops.sources.colTier}">Tier</th>
              <th th:text="#{ops.sources.colCode}">Code</th>
              <th th:text="#{ops.sources.colName}">Name</th>
              <th th:text="#{ops.sources.colFetchType}">Fetch type</th>
              <th th:text="#{ops.sources.colLang}">Lang</th>
              <th th:text="#{ops.sources.colHost}">Host</th>
              <th th:text="#{ops.sources.colVerified}">URL verified</th>
            </tr></thead>
            <tbody>
              <tr th:each="s : ${sources}">
                <td><span class="badge" th:classappend="${s.tier == 1} ? 'badge-success' : (${s.tier == 2} ? 'badge-info' : (${s.tier == 3} ? 'badge-warn' : 'badge-neutral'))"
                          th:text="'Tier ' + ${s.tier}">Tier 1</span></td>
                <td><span class="code-chip code-chip-sm" th:text="${s.code}">MOF_ISA</span></td>
                <td th:text="${s.name}">Name</td>
                <td th:text="${s.type}">HTML</td>
                <td th:text="${s.language}">vi</td>
                <td style="font-family:var(--font-mono);font-size:var(--text-xs)" th:text="${s.allowedHost}">host</td>
                <td>
                  <span th:if="${s.urlUnverified}" class="badge badge-warn" th:text="#{ops.sources.unverified}">Unverified</span>
                  <span th:unless="${s.urlUnverified}" class="badge badge-success" th:text="#{ops.sources.verified}">Verified</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div></div>

        <form method="post" action="/ingest/run" style="margin-top:16px">
          <button class="btn btn-primary" type="submit" th:text="#{ops.sources.actionLabel}">Run ingest now</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="/js/ops-session.js"></script>
<script src="/js/ops-sidebar.js"></script>
<script src="/js/ops-pipeline-guard.js"></script>
</body>
</html>
