<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8"/><title>Market Radar — Source Registry</title>
<style>
  body{font-family:"Segoe UI",Arial,sans-serif;font-size:14px;color:#1B2233;background:#FAFAF7;max-width:840px;margin:32px auto;padding:0 20px}
  h1{font-family:Charter,Cambria,Georgia,serif;border-bottom:3px solid #A31621;padding-bottom:10px}
  table{width:100%;border-collapse:collapse;margin-top:18px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#5A6172;border-bottom:2px solid #1B2233;padding:6px}
  td{border-bottom:1px solid #E5E7EB;padding:9px 6px;vertical-align:top}
  .warn{color:#A35A12;font-size:11px}
  .btn{display:inline-block;margin-top:20px;padding:8px 16px;background:#1B2233;color:#fff;border:none;cursor:pointer;font-size:13px}
</style>
</head>
<body>
<h1>Source Registry — cấu hình auditable</h1>
<p>Whitelist nguồn + tier cố định. Chỉ URL khớp host trong bảng này mới được fetch.</p>
<table>
  <thead><tr><th>Tier</th><th>Mã</th><th>Nguồn</th><th>Loại</th><th>Ngôn ngữ</th><th>Host whitelist</th><th>Trạng thái URL</th></tr></thead>
  <tbody>
    <tr th:each="s : ${sources}">
      <td th:text="${s.tier}">1</td>
      <td th:text="${s.code}">MOF_ISA</td>
      <td th:text="${s.name}">Tên</td>
      <td th:text="${s.type}">HTML</td>
      <td th:text="${s.language}">vi</td>
      <td th:text="${s.allowedHost}">mof.gov.vn</td>
      <td><span class="warn" th:if="${s.urlUnverified}">⚠ chưa verify</span><span th:unless="${s.urlUnverified}">✓</span></td>
    </tr>
  </tbody>
</table>
<form method="post" action="/ingest/run"><button class="btn" type="submit">Chạy ingest ngay (tay)</button></form>
<p style="font-size:12px;color:#5A6172;margin-top:8px">Kết quả từng nguồn (kể cả lý do bị từ chối) sẽ hiển thị dạng text — fail loud.</p>
</body>
</html>
