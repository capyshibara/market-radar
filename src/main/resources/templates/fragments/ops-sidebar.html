<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(active, queueCount)" class="ops-sidebar">
  <div class="ops-sidebar-head">
    <a href="/review" style="line-height:0"><th:block th:replace="~{fragments/radar-mark :: lockup(18, 'light')}"></th:block></a>
    <div class="lang-toggle">
      <a href="?lang=en" th:classappend="${#locale.language == 'en'} ? 'is-active'">EN</a>
      <a href="?lang=vi" th:classappend="${#locale.language == 'vi'} ? 'is-active'">VI</a>
    </div>
  </div>

  <div class="ops-sidebar-body">
    <div>
      <div class="ops-nav-group-label" th:text="#{ops.sidebar.groupIntelligence}">Intelligence</div>
      <div class="ops-nav-group">
        <a href="/report/weekly" class="ops-nav-item" th:text="#{ops.sidebar.navProductReports}">Product Reports ↗</a>
      </div>
    </div>

    <div>
      <div class="ops-nav-group-label" th:text="#{ops.sidebar.groupAction}">Needs action</div>
      <div class="ops-nav-group">
        <a href="/review" class="ops-nav-item" th:classappend="${active == 'review'} ? 'is-active'">
          <span th:text="#{ops.sidebar.navReview}">Reviewer Queue</span>
          <span class="nav-badge" th:if="${queueCount != null and queueCount > 0}" th:text="${queueCount}">3</span>
        </a>
      </div>
    </div>

    <div data-nav-group="pipeline">
      <div class="ops-nav-group-label" th:text="#{ops.sidebar.groupOperations}">Operations</div>
      <div class="ops-nav-group">
        <a href="/pipeline" class="ops-nav-item" th:classappend="${active == 'pipelinerun'} ? 'is-active'" th:text="#{ops.sidebar.navPipelineRun}">Pipeline Runner</a>
        <a href="/pipeline/history" class="ops-nav-item" th:classappend="${active == 'pipelinehistory'} ? 'is-active'" th:text="#{ops.sidebar.navRunHistory}">Run History</a>
        <a href="/sources" class="ops-nav-item" th:classappend="${active == 'sources'} ? 'is-active'" th:text="#{ops.sidebar.navSources}">Source Registry</a>
      </div>
    </div>

    <details class="ops-nav-advanced"
             th:attr="open=${active == 'claims' or active == 'labels' or active == 'alerts' or active == 'llmsettings' or active == 'prompts' or active == 'classifications' or active == 'dedup' or active == 'rolematrix'} ? 'open' : null">
      <summary th:text="#{ops.sidebar.groupAdvanced}">Advanced</summary>
      <div class="ops-nav-group ops-nav-advanced-items">
        <a href="/claims" class="ops-nav-item" th:classappend="${active == 'claims'} ? 'is-active'" th:text="#{ops.sidebar.navClaims}">Claim Audit</a>
        <a href="/labels" class="ops-nav-item" th:classappend="${active == 'labels'} ? 'is-active'" th:text="#{ops.sidebar.navLabels}">Label Log</a>
        <a href="/alerts" class="ops-nav-item" th:classappend="${active == 'alerts'} ? 'is-active'" th:text="#{ops.sidebar.navAlerts}">Hot Alert Log</a>
        <a href="/llm-settings" class="ops-nav-item" data-role-show="admin,auditor" th:classappend="${active == 'llmsettings'} ? 'is-active'" th:text="#{ops.sidebar.navLlmSettings}">LLM Settings</a>
        <a href="/prompts" class="ops-nav-item" data-role-show="admin,auditor" th:classappend="${active == 'prompts'} ? 'is-active'" th:text="#{ops.sidebar.navPrompts}">AI Prompts</a>
        <a href="/classifications" class="ops-nav-item" data-role-show="admin,auditor" th:classappend="${active == 'classifications'} ? 'is-active'" th:text="#{ops.sidebar.navClassifications}">Classifier + Routing</a>
        <a href="/dedup" class="ops-nav-item" data-role-show="admin,auditor" th:classappend="${active == 'dedup'} ? 'is-active'" th:text="#{ops.sidebar.navDedup}">Dedup / Conflict</a>
        <a href="/ops/role-matrix" class="ops-nav-item" th:classappend="${active == 'rolematrix'} ? 'is-active'" th:text="#{ops.sidebar.navRoleMatrix}">Roles &amp; Permissions</a>
      </div>
    </details>
  </div>

  <div class="ops-sidebar-footer">
    <div class="ops-account" id="ops-account-toggle">
      <div class="ops-avatar" id="ops-avatar">··</div>
      <div style="flex:1;min-width:0">
        <div class="ops-account-name" id="ops-account-name">—</div>
        <div class="ops-account-role" id="ops-account-role">—</div>
      </div>
      <span class="ops-account-caret">▾</span>
    </div>
    <div class="ops-switcher" id="ops-switcher">
      <div class="ops-switcher-label" th:text="#{ops.common.switchAccount}">Switch demo account</div>
      <div class="ops-switcher-item" th:each="acc : ${T(java.util.List).of(
              T(java.util.Map).of('name','Nguyễn Thị Minh Hạnh','email','hanh.nguyen@marketradar-demo.vn','role','Checker · Compliance'),
              T(java.util.Map).of('name','Nguyễn Phương Đình','email','dinh.nguyen@marketradar-demo.vn','role','Maker · Product'),
              T(java.util.Map).of('name','Trần Văn Cao','email','cao.tran@marketradar-demo.vn','role','Compliance Admin'),
              T(java.util.Map).of('name','Lê Hoàng Anh','email','anh.le@marketradar-demo.vn','role','Auditor'))}"
           th:attr="data-email=${acc.get('email')}">
        <div class="n" th:text="${acc.get('name')}">Name</div>
        <div class="r" th:text="${acc.get('role')}">Role</div>
      </div>
      <div class="ops-signout" id="ops-signout" th:text="#{ops.common.signOut}">Sign out</div>
    </div>
  </div>
</div>
</body>
</html>
