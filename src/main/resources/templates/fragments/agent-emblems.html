<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Agent hero emblems — hand-ported from the Claude Design "Market Radar Design System"
  bundle (components/core/AgentEmblem.jsx): flat poster style, saturated fields, ink
  (#0B1226) outlines, offset darker circle for depth. Each agent's insignia is a unique
  one-off. Use on avatar/hero surfaces (pipeline cards, Newsroom, slides); keep
  fragments/agent-marks.html for compact systematic contexts (chain-of-custody, chips).

  Bundle→canonical cast mapping (bundle used its own agent names):
    scanner→Scout · merger→Librarian · parser→Router · extractor→Researcher ·
    comparator→Connector · analyst→Analyst · screener→Editor · checker→Fact-checker ·
    editor(wax seal)→Product SME (human).
  "verifier" is NEW (the bundle had no Independent Verifier): "The Second Opinion" —
  navy field, a cream balance scale weighing claim against evidence — drawn to the same
  recipe (ink outlines, offset deep circle, gold/teal accessories).
-->

<!-- Scout — "The Watcher": teal field, wide-open eye, gold rays. Nothing gets past it. -->

    <circle cx="32" cy="34" r="8" fill="#2647E8" stroke="#0B1226" stroke-width="1.8"/>
    <circle cx="32" cy="34" r="3" fill="#0B1226"/>
    <circle cx="34.8" cy="31" r="1.6" fill="#F2EFE8"/>

</svg>
