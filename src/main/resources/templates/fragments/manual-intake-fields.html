<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><body>
<th:block th:fragment="metadata">
  <div class="intake-fields">
    <div class="wide"><label class="lbl">Title</label><input class="ops-input" name="title" maxlength="300" required placeholder="BCG: Soft Rates and Big Risks…"/></div>
    <div><label class="lbl">Publisher</label><input class="ops-input" name="publisher" maxlength="180" required placeholder="Boston Consulting Group"/></div>
    <div><label class="lbl">Document language</label><select class="ops-select" name="language"><option value="en">English</option><option value="vi">Vietnamese</option><option value="zh">Chinese</option><option value="ko">Korean</option><option value="ja">Japanese</option></select></div>
    <div><label class="lbl">Publication date</label><input class="ops-input" name="publishedDate" type="date" th:value="${today}" required/></div>
    <div><label class="lbl">Original HTTPS URL</label><input class="ops-input" name="sourceUrl" type="url" required placeholder="https://www.bcg.com/..."/></div>
  </div>
</th:block>
</body></html>
