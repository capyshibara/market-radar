<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"><head><meta charset="UTF-8"/><title th:text="${vi ? 'Biên tập Chuyên đề · Market Radar' : 'Special Issue Review · Market Radar'}">Special Issue Review · Market Radar</title><link rel="stylesheet" href="/css/fonts.css"/><link rel="stylesheet" href="/css/colors.css"/><link rel="stylesheet" href="/css/typography.css"/><link rel="stylesheet" href="/css/spacing.css"/><link rel="stylesheet" href="/css/base.css"/><link rel="stylesheet" href="/css/patterns.css"/><link rel="stylesheet" href="/css/ops-components.css"/><link rel="stylesheet" href="/css/ops-sidebar.css"/><style>.editor-grid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:20px}.panel{padding:22px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--surface-card);margin-bottom:18px}.panel h2{margin:0 0 6px}.panel-intro{margin:0 0 18px;color:var(--text-secondary)}.field{margin:0 0 15px}.field label{display:block;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}.field textarea{min-height:90px;resize:vertical}.field textarea.long{min-height:150px}.chapter{padding:18px 0;border-top:1px solid var(--border-default)}.chapter:first-of-type{border-top:0}.chapter-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}.chapter-no{font-family:var(--font-mono);font-size:11px;color:var(--brand-red-600)}.sticky{position:sticky;top:20px}.notice{padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:16px}.notice.ok{background:var(--green-50);color:var(--green-700)}.notice.err{background:var(--rose-50);color:var(--rose-700)}.source-editor{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 0;border-top:1px solid var(--border-default)}@media(max-width:1000px){.editor-grid{grid-template-columns:1fr}.sticky{position:static}}</style></head><body><div class="ops-shell"><th:block th:replace="~{fragments/ops-sidebar :: sidebar('specialissueeditor', ${null})}"></th:block><div class="ops-main"><div class="ops-content"><div class="page-header"><div><h1 th:text="${vi ? 'Biên tập Chuyên đề' : 'Special Issue Review'}">Special Issue Review</h1><p th:text="${vi ? 'Biên tập thủ công từng ngôn ngữ trước khi xuất bản bản đọc và PDF.' : 'Human-edit each language before publishing the reader and PDF.'}">Description</p></div><div class="actions"><a class="btn btn-secondary" th:href="${'/product/special-issues/'+issue.slug+'?lang='+(vi?'vi':'en')}" target="_blank" th:text="${vi ? 'Xem bản đọc' : 'Preview reader'}">Preview</a></div></div><p class="notice ok" th:if="${editorialSuccess}" th:text="${editorialSuccess}">Saved</p><p class="notice err" th:if="${editorialError}" th:text="${editorialError}">Error</p>
<form method="post"><div class="editor-grid"><main><section class="panel"><h2 th:text="${vi ? 'Trang bìa và định vị' : 'Cover and positioning'}">Cover</h2><p class="panel-intro" th:text="${vi ? 'Các trường này kiểm soát bìa, mục lục và tóm tắt điều hành.' : 'These fields control the cover, contents, and executive summary.'}">Intro</p><div class="field"><label th:text="${vi ? 'Chuyên san' : 'Series'}">Series</label><input class="ops-input" name="series" th:value="${issue.series}"/></div><div class="field"><label th:text="${vi ? 'Tiêu đề' : 'Title'}">Title</label><input class="ops-input" name="title" th:value="${issue.title}"/></div><div class="field"><label th:text="${vi ? 'Dòng giới thiệu' : 'Deck'}">Deck</label><textarea class="ops-input" name="deck" th:text="${issue.deck}"></textarea></div><div class="field"><label th:text="${vi ? 'Tháng phát hành' : 'Issue month'}">Issue month</label><input class="ops-input" name="issueMonth" th:value="${issue.issueMonth}"/></div><div class="field"><label th:text="${vi ? 'Dòng nguồn gốc' : 'Provenance line'}">Provenance</label><input class="ops-input" name="provenance" th:value="${issue.provenance}"/></div><div class="field"><label th:text="${vi ? 'Tóm tắt điều hành' : 'Executive summary'}">Executive summary</label><textarea class="ops-input long" name="executiveSummary" th:text="${issue.executiveSummary}"></textarea></div></section>
<section class="panel"><h2 th:text="${vi ? 'Ba kết luận chính' : 'Three key findings'}">Findings</h2><div class="chapter" th:each="finding,stat:${issue.keyFindings}"><div class="chapter-head"><span class="chapter-no" th:text="${finding.number}">01</span></div><div class="field"><label th:text="${vi ? 'Tiêu đề' : 'Finding title'}">Title</label><input class="ops-input" th:name="${'finding.'+stat.index+'.title'}" th:value="${finding.title}"/></div><div class="field"><label th:text="${vi ? 'Nội dung' : 'Finding detail'}">Detail</label><textarea class="ops-input" th:name="${'finding.'+stat.index+'.detail'}" th:text="${finding.detail}"></textarea></div></div></section>
<section class="panel"><h2 th:text="${vi ? 'Nội dung từng chương' : 'Chapter content'}">Chapters</h2><p class="panel-intro" th:text="${vi ? 'Tách đoạn bằng một dòng trống. Mỗi gạch đầu dòng nằm trên một dòng.' : 'Separate paragraphs with a blank line. Put each bullet on its own line.'}">Guidance</p><div class="chapter" th:each="section,stat:${issue.sections}"><div class="chapter-head"><span class="chapter-no" th:text="${section.number}">01</span><strong th:text="${section.title}">Chapter</strong></div><div class="field"><label th:text="${vi ? 'Tiêu đề chương' : 'Chapter title'}">Title</label><input class="ops-input" th:name="${'section.'+stat.index+'.title'}" th:value="${section.title}"/></div><div class="field"><label th:text="${vi ? 'Lời dẫn' : 'Lead'}">Lead</label><textarea class="ops-input" th:name="${'section.'+stat.index+'.lead'}" th:text="${section.lead}"></textarea></div><div class="field"><label th:text="${vi ? 'Các đoạn phân tích' : 'Analysis paragraphs'}">Paragraphs</label><textarea class="ops-input long" th:name="${'section.'+stat.index+'.paragraphs'}" th:text="${section.paragraphsText}"></textarea></div><div class="field"><label th:text="${vi ? 'Gạch đầu dòng' : 'Bullets'}">Bullets</label><textarea class="ops-input" th:name="${'section.'+stat.index+'.bullets'}" th:text="${section.bulletsText}"></textarea></div></div></section>
<section class="panel"><h2 th:text="${vi ? 'Danh mục nguồn' : 'Source register'}">Sources</h2><div class="source-editor" th:each="source,stat:${issue.sources}"><div class="field"><label th:text="${vi ? 'Nhà xuất bản' : 'Publisher'}">Publisher</label><input class="ops-input" th:name="${'source.'+stat.index+'.publisher'}" th:value="${source.publisher}"/></div><div class="field"><label th:text="${vi ? 'Tên tài liệu' : 'Source title'}">Title</label><input class="ops-input" th:name="${'source.'+stat.index+'.title'}" th:value="${source.title}"/></div><div class="field" style="grid-column:1/-1"><label th:text="${vi ? 'Liên kết nguồn' : 'Source URL'}">Source URL</label><input class="ops-input" type="url" th:name="${'source.'+stat.index+'.url'}" th:value="${source.url}"/></div><div class="field" style="grid-column:1/-1"><label th:text="${vi ? 'Loại nguồn' : 'Source type'}">Type</label><input class="ops-input" th:name="${'source.'+stat.index+'.type'}" th:value="${source.type}"/></div></div></section></main>
<aside><div class="panel sticky"><h2 th:text="${vi ? 'Kiểm soát biên tập' : 'Editorial control'}">Editorial control</h2><p th:text="${vi ? 'Bạn đang sửa riêng bản tiếng Việt. Chuyển EN/VI ở thanh bên để sửa ngôn ngữ còn lại.' : 'You are editing the English edition independently. Use the sidebar EN/VI switch for the other language.'}">Language</p><ul><li th:text="${vi ? 'Không thay đổi trích dẫn định lượng nếu không cập nhật nguồn.' : 'Do not change quantitative claims without updating the source.'}">Rule</li><li th:text="${vi ? 'Giữ ranh giới giữa bằng chứng, suy luận và khuyến nghị.' : 'Keep evidence, inference, and recommendation distinct.'}">Rule</li><li th:text="${vi ? 'Xem lại bản đọc và PDF sau khi lưu.' : 'Review both reader and PDF after saving.'}">Rule</li></ul><button class="btn btn-primary" style="width:100%" type="submit" th:text="${vi ? 'Lưu bản biên tập' : 'Save editorial draft'}">Save</button></div></aside></div></form></div></div></div><script src="/js/ops-session.js"></script><script src="/js/ops-sidebar.js"></script></body></html>
