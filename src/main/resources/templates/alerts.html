<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{ops.alerts.title}">Hot Alert Log</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>
  .alert-card { border: 1px solid var(--border-default); border-radius: var(--radius-md); background: var(--surface-card); margin-bottom: 12px; overflow: hidden; }
  .alert-head { display: flex; gap: 8px; align-items: center; padding: 9px 14px; flex-wrap: wrap; border-bottom: 1px solid var(--border-subtle); font-size: var(--text-xs); color: var(--text-secondary); }
  .alert-head .spacer { margin-left: auto; }
  .alert-note { font-size: var(--text-xs); color: var(--amber-700); padding: 8px 14px; background: var(--amber-50); }
</style>
</head>
<body>
<div class="ops-shell">
  <th:block th:replace="~{fragments/ops-sidebar :: sidebar('alerts', ${queueCount})}"></th:block>
  <div class="ops-main">
    <div class="ops-content">
      <div class="page-header">
        <div>
          <h1 th:text="#{ops.alerts.title}">Hot Alert Log</h1>
          <p th:text="#{ops.alerts.description}">description</p>
        </div>
      </div>

      <div class="flash flash-stub" th:if="${#lists.size(alerts) > 0 and alerts[0].channel.name() == 'STUB'}" th:text="#{ops.alerts.stubBanner}">
        STUB mode banner
      </div>

      <div th:if="${#lists.isEmpty(alerts)}" class="empty-state">
        <div class="title">No alerts yet</div>
        <div class="desc">Approve a T3+ claim to see one here.</div>
      </div>

      <div class="alert-card" th:each="a : ${alerts}">
        <div class="alert-head">
          <span class="code-chip code-chip-sm" th:text="${a.claimCode}">C-001</span>
          <span class="badge badge-sm" th:classappend="'badge-tier-' + ${a.riskTier}" th:text="${a.riskTier}">T3</span>
          <span th:switch="${a.status.name()}">
            <span th:case="'SENT'" class="badge badge-sm badge-success">SENT</span>
            <span th:case="'FAILED'" class="badge badge-sm badge-danger">FAILED</span>
            <span th:case="*" class="badge badge-sm badge-neutral">SKIPPED</span>
          </span>
          <span class="provider-tag provider-sm provider-stub" th:if="${a.channel.name() == 'STUB'}">STUB</span>
          <span th:text="'trigger: ' + ${a.trigger}">trigger</span>
          <span th:if="${a.httpStatus != null}" th:text="'HTTP ' + ${a.httpStatus}">HTTP 200</span>
          <span class="ts spacer" th:text="${a.createdAt}">2026-07-05</span>
        </div>
        <div class="json-viewer" style="border:none;border-radius:0">
          <pre th:text="${a.payloadText}">payload</pre>
        </div>
        <div class="alert-note" th:if="${a.note != null}" th:text="${a.note}">note</div>
      </div>
    </div>
  </div>
</div>
<script src="/js/ops-session.js"></script>
<script src="/js/ops-sidebar.js"></script>
</body>
</html>
