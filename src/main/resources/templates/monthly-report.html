<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${lang}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title th:text="${'Market Radar · ' + cadenceLabel}">Market Radar</title>
  <link rel="stylesheet" href="/css/fonts.css"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <style>
    body{max-width:960px;margin:0 auto;padding:40px 28px;color:#17233d;font-family:Arial,sans-serif}.report-header{border-bottom:4px solid #ba122b;padding-bottom:20px}.eyebrow,.meta,.kiq,.caveat{color:#596273}.cadence-nav{display:flex;gap:18px;margin:18px 0}.status,.insight,.watch,.references{padding:22px;margin:18px 0;border:1px solid #ddd;border-radius:10px}.insufficient{border-color:#b97600;background:#fff8e8}.insight{border-left:5px solid #ba122b}.watch{border-left:5px solid #b97600}h4{margin-bottom:4px}p{line-height:1.55}code{font-size:.82em}@media print{.cadence-nav{display:none}body{padding:0}.insight,.watch{break-inside:avoid}}
  </style>
</head>
<body>
  <th:block th:replace="~{fragments/product-report :: body}"></th:block>
</body>
</html>
