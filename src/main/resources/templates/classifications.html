<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{ops.classifications.title}">Classifier + Routing</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>
  .rm-section-title { font-size: var(--text-lg); font-weight: 600; margin: 28px 0 4px; }
  .rm-section-desc { font-size: var(--text-sm); color: var(--text-secondary); margin: 0 0 12px; }
</style>
</head>
<body>
<div class="ops-shell">
  <th:block th:replace="~{fragments/ops-sidebar :: sidebar('classifications', ${queueCount})}"></th:block>
  <div class="ops-main">
    <div class="ops-content">

      <div id="pipeline-denied" class="empty-state" style="display:none;margin-top:24px">
        <div class="title" th:text="#{ops.classifications.deniedTitle}">No access</div>
        <div class="desc" th:text="#{ops.classifications.deniedDesc}">Restricted.</div>
      </div>

      <div id="pipeline-content">
        <div class="page-header">
          <div>
            <h1 th:text="#{ops.classifications.title}">Classifier + Routing</h1>
            <p th:text="#{ops.classifications.description}">description</p>
          </div>
        </div>

        <div class="flash flash-stub" th:if="${!items.isEmpty() and items[0].llmProvider == 'STUB'}" th:text="#{ops.classifications.stubBanner}">
          STUB mode banner
        </div>

        <form method="post" action="/classify/run" style="margin-bottom:20px">
          <button class="btn btn-primary" type="submit" th:text="#{ops.classifications.actionLabel}">Run classify + routing</button>
        </form>

        <div class="data-table-wrap"><div class="data-table-scroll">
          <table class="data-table">
            <thead><tr>
              <th th:text="#{ops.classifications.colDoc}">Doc</th>
              <th th:text="#{ops.classifications.colLabel}">Label</th>
              <th th:text="#{ops.classifications.colStatus}">Status</th>
              <th th:text="#{ops.classifications.colRouting}">Routing</th>
              <th th:text="#{ops.classifications.colDept}">Dept</th>
              <th th:text="#{ops.classifications.colVotes}">Votes (3x)</th>
            </tr></thead>
            <tbody>
              <tr th:each="c : ${items}">
                <td>
                  <span class="code-chip code-chip-sm" th:text="'#' + ${c.rawDoc.id}">#1</span>
                  <div style="font-size:var(--text-2xs);color:var(--text-tertiary);margin-top:2px" th:text="${c.rawDoc.title}">title</div>
                </td>
                <td><span class="badge badge-sm badge-success" th:each="l : ${c.labels}" th:text="${l}" style="margin-right:3px">LABEL</span></td>
                <td>
                  <span class="badge badge-sm"
                        th:classappend="${c.status.name() == 'CONFIRMED'} ? 'badge-success' : (${c.status.name() == 'OUT_OF_SCOPE'} ? 'badge-neutral' : 'badge-warn')"
                        th:text="${c.status}">CONFIRMED</span>
                </td>
                <td>
                  <span class="badge badge-sm"
                        th:classappend="${c.routingStatus.name() == 'ROUTED'} ? 'badge-success' : (${c.routingStatus.name() == 'ADMIN_QUEUE'} ? 'badge-override' : 'badge-warn')"
                        th:text="${c.routingStatus}">ROUTED</span>
                  <div style="font-size:var(--text-2xs);color:var(--text-tertiary);margin-top:2px" th:text="${c.note}">note</div>
                </td>
                <td><span th:each="d : ${c.departments}" th:text="${d.ten} + ' '">Dept</span></td>
                <td style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary)" th:text="${c.votesJson}">{}</td>
              </tr>
            </tbody>
          </table>
        </div></div>

        <div class="rm-section-title" th:text="#{ops.classifications.routingTitle}">Routing rules</div>
        <p class="rm-section-desc" th:text="#{ops.classifications.routingDesc}">desc</p>
        <div class="data-table-wrap"><div class="data-table-scroll">
          <table class="data-table">
            <thead><tr>
              <th th:text="#{ops.classifications.colCategory}">Category</th>
              <th th:text="#{ops.classifications.colDepartment}">Department</th>
              <th th:text="#{ops.classifications.colPlaceholderStatus}">Status</th>
            </tr></thead>
            <tbody>
              <tr th:each="r : ${rules}">
                <td th:text="${r.category}">PRODUCT_LAUNCH</td>
                <td th:text="${r.department.ten}">Dept</td>
                <td>
                  <span th:if="${r.placeholder}" class="badge badge-sm badge-warn" th:text="#{ops.classifications.placeholder}">Placeholder</span>
                  <span th:unless="${r.placeholder}" class="badge badge-sm badge-success" th:text="#{ops.classifications.wired}">Wired</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div></div>
      </div>
    </div>
  </div>
</div>
<script src="/js/ops-session.js"></script>
<script src="/js/ops-sidebar.js"></script>
<script src="/js/ops-pipeline-guard.js"></script>
</body>
</html>
