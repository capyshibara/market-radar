<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"><head><meta charset="UTF-8"/><title th:text="${#locale.language == 'vi' ? 'Kho dữ liệu · Market Radar' : 'Corpus Explorer · Market Radar'}">Corpus Explorer · Market Radar</title>
<link rel="stylesheet" href="/css/fonts.css"/><link rel="stylesheet" href="/css/colors.css"/><link rel="stylesheet" href="/css/typography.css"/><link rel="stylesheet" href="/css/spacing.css"/><link rel="stylesheet" href="/css/base.css"/><link rel="stylesheet" href="/css/patterns.css"/><link rel="stylesheet" href="/css/ops-components.css"/><link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>.summary-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;margin:18px 0 24px}.summary-card{padding:18px;border:1px solid var(--border-default);background:var(--surface-card);border-radius:var(--radius-md)}.summary-card strong{display:block;font-size:26px;color:var(--text-primary)}.summary-card span{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}.filters{display:grid;grid-template-columns:2fr repeat(3,1fr) auto;gap:10px;margin-bottom:14px}.doc-title{font-weight:650;color:var(--text-primary)}.doc-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}.state{display:inline-block;padding:4px 8px;border-radius:999px;background:var(--slate-100);font-size:10px;font-weight:700}.state[data-state="REPORT_ELIGIBLE"],.state[data-state="EVIDENCE_EXTRACTED"]{background:var(--green-50);color:var(--green-700)}.state[data-state="IMPORT_FAILED"],.state[data-state="HELD_FOR_REVIEW"]{background:var(--rose-50);color:var(--rose-700)}.table-pagination{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border:1px solid var(--border-default);border-top:0;background:var(--surface-card);font-size:var(--text-xs);color:var(--text-secondary)}.pagination-actions{display:flex;gap:7px}@media(max-width:1050px){.summary-grid{grid-template-columns:repeat(3,1fr)}.filters{grid-template-columns:1fr 1fr}}</style></head>
<body><div class="ops-shell"><th:block th:replace="~{fragments/ops-sidebar :: sidebar('corpus', ${null})}"></th:block><div class="ops-main"><div class="ops-content">
<div class="page-header"><div><h1 th:text="${#locale.language == 'vi' ? 'Kho dữ liệu' : 'Corpus Explorer'}">Corpus Explorer</h1><p th:text="${#locale.language == 'vi' ? 'Kiểm tra tài liệu, toàn văn và trạng thái xử lý thực tế của kho bằng chứng.' : 'Inspect documents, full text, and the real processing state of the evidence corpus.'}">Description</p></div><div class="actions"><a class="btn btn-secondary" href="/documents/intake" th:text="${#locale.language == 'vi' ? 'Thêm tài liệu' : 'Add document'}">Add document</a><a class="btn btn-secondary" href="/corpus.csv" th:text="${#locale.language == 'vi' ? 'Xuất CSV' : 'Export CSV'}">Export CSV</a></div></div>
<div class="summary-grid"><div class="summary-card"><strong th:text="${summary.documents}">0</strong><span th:text="${#locale.language == 'vi' ? 'Tài liệu' : 'Documents'}">Documents</span></div><div class="summary-card"><strong th:text="${summary.fullTextDocuments}">0</strong><span th:text="${#locale.language == 'vi' ? 'Toàn văn' : 'Full text'}">Full text</span></div><div class="summary-card"><strong th:text="${summary.manualDocuments}">0</strong><span th:text="${#locale.language == 'vi' ? 'Thêm thủ công' : 'Manual intake'}">Manual</span></div><div class="summary-card"><strong th:text="${summary.activeFacts}">0</strong><span th:text="${#locale.language == 'vi' ? 'Fact đang hoạt động' : 'Active facts'}">Facts</span></div><div class="summary-card"><strong th:text="${summary.activeClaims}">0</strong><span th:text="${#locale.language == 'vi' ? 'Claim đang hoạt động' : 'Active claims'}">Active claims</span></div><div class="summary-card"><strong th:text="${summary.verifiedClaims}">0</strong><span th:text="${#locale.language == 'vi' ? 'Đã kiểm chứng' : 'Verified'}">Verified</span></div></div>
<div class="filters"><input class="ops-input" id="search" th:placeholder="${#locale.language == 'vi' ? 'Tìm tiêu đề, nhà xuất bản hoặc ID' : 'Search title, publisher, or ID'}"/><select class="ops-select" id="intake"><option value="" th:text="${#locale.language == 'vi' ? 'Mọi phương thức' : 'All intake methods'}">All intake</option><option>CRAWLED</option><option>MANUAL_TEXT</option><option>FILE_UPLOAD</option></select><select class="ops-select" id="language"><option value="" th:text="${#locale.language == 'vi' ? 'Mọi ngôn ngữ' : 'All languages'}">All languages</option><option value="vi">VI</option><option value="en">EN</option></select><select class="ops-select" id="state"><option value="" th:text="${#locale.language == 'vi' ? 'Mọi trạng thái' : 'All states'}">All states</option></select><button class="btn btn-ghost" id="clear" type="button" th:text="${#locale.language == 'vi' ? 'Xóa lọc' : 'Clear'}">Clear</button></div>
<div class="data-table-wrap"><div class="data-table-scroll"><table class="data-table" id="corpus-table"><thead><tr><th>Doc</th><th th:text="${#locale.language == 'vi' ? 'Tài liệu' : 'Document'}">Document</th><th th:text="${#locale.language == 'vi' ? 'Phương thức' : 'Intake'}">Intake</th><th th:text="${#locale.language == 'vi' ? 'Ngôn ngữ' : 'Language'}">Language</th><th th:text="${#locale.language == 'vi' ? 'Độ dài' : 'Depth'}">Depth</th><th th:text="${#locale.language == 'vi' ? 'Trạng thái' : 'State'}">State</th><th th:text="${#locale.language == 'vi' ? 'Đầu ra' : 'Outputs'}">Outputs</th></tr></thead><tbody><tr th:each="doc:${documents}" th:attr="data-search=${#strings.toLowerCase(doc.id + ' ' + doc.title + ' ' + doc.publisher)},data-intake=${doc.intakeMethod},data-language=${doc.language},data-state=${doc.state}"><td><a class="code-chip" th:href="${'/corpus/'+doc.id}" th:text="${'#'+doc.id}">#1</a></td><td><div class="doc-title" th:text="${doc.title}">Title</div><div class="doc-sub" th:text="${doc.publisher + ' · ' + doc.sourceCode}">Publisher</div></td><td th:text="${doc.intakeMethod}">CRAWLED</td><td th:text="${#strings.toUpperCase(doc.language)}">EN</td><td th:text="${doc.textCharacters + (#locale.language == 'vi' ? ' ký tự' : ' chars')}">0</td><td><span class="state" th:attr="data-state=${doc.state}" th:text="${doc.state}">STATE</span></td><td th:text="${doc.factCount + ' facts · ' + doc.claimCount + ' claims · ' + doc.verifiedClaimCount + (#locale.language == 'vi' ? ' đã kiểm chứng' : ' verified')}">Outputs</td></tr></tbody></table></div></div><div class="table-pagination"><span id="page-summary"></span><div class="pagination-actions"><button class="btn btn-ghost btn-sm" id="page-previous" type="button" th:text="${#locale.language == 'vi' ? 'Trước' : 'Previous'}">Previous</button><button class="btn btn-ghost btn-sm" id="page-next" type="button" th:text="${#locale.language == 'vi' ? 'Tiếp' : 'Next'}">Next</button></div></div>
</div></div></div><script src="/js/ops-session.js"></script><script src="/js/ops-sidebar.js"></script><script src="/js/corpus-explorer.js"></script></body></html>
