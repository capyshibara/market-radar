<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{ops.claims.title}">Claim Audit</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>
  .claim-card { border: 1px solid var(--border-default); border-radius: var(--radius-md); background: var(--surface-card); margin-bottom: 16px; overflow: hidden; }
  .claim-card-head { display: flex; gap: 8px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); flex-wrap: wrap; font-size: var(--text-xs); color: var(--text-secondary); }
  .claim-card-body { padding: 14px; }
  .claim-card-text { font-size: var(--text-md); margin-bottom: 12px; }
  .claim-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .claim-cols > div { min-width: 0; }
  @media (max-width: 900px) { .claim-cols { grid-template-columns: 1fr; } }
  .claim-cols h4 { font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--text-tertiary); margin: 0 0 6px; font-weight: 700; }
  .counts { display: flex; gap: 8px; margin-bottom: 16px; }
  .count-pill { padding: 10px 16px; border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 600; }
</style>
</head>
<body>
<div class="ops-shell">
  <th:block th:replace="~{fragments/ops-sidebar :: sidebar('claims', ${queueCount})}"></th:block>
  <div class="ops-main">
    <div class="ops-content">
      <div class="page-header">
        <div>
          <h1 th:text="#{ops.claims.title}">Claim Audit</h1>
          <p th:text="#{ops.claims.description}">description</p>
        </div>
      </div>

      <div class="counts">
        <div class="count-pill" style="background:var(--green-50);color:var(--green-700)" th:text="#{ops.claims.passed(${passCount})}">0 passed</div>
        <div class="count-pill" style="background:var(--rose-50);color:var(--rose-600)" th:text="#{ops.claims.failed(${failCount})}">0 failed</div>
      </div>

      <div th:if="${#lists.isEmpty(views)}" class="empty-state">
        <div class="title">No claims yet</div>
        <div class="desc">Run POST /interpret/run first.</div>
      </div>

      <div class="claim-card" th:each="v : ${views}">
        <div class="claim-card-head">
          <span class="code-chip code-chip-sm" th:text="${v.claim.claimCode}">C-001</span>
          <span th:text="${v.claim.slot}">WHY_MATTERS</span>
          <span class="badge badge-sm" th:classappend="'badge-gate-' + ${v.claim.gateStatus}" th:text="${v.claim.gateStatus}">PASS</span>
          <span class="badge badge-sm badge-warn" th:if="${v.claim.origin.name() == 'DEMO_INJECT'}" th:text="#{ops.claims.demoInjection}">demo</span>
          <span class="provider-tag provider-sm" th:classappend="${v.claim.llmProvider == 'STUB' or v.claim.llmProvider == 'DEMO'} ? 'provider-stub' : 'provider-ai'"
                th:text="${v.claim.llmProvider == 'STUB' or v.claim.llmProvider == 'DEMO'} ? 'STUB' : 'AI'">AI</span>
          <span th:if="${v.claim.rawDoc != null}" th:text="'doc#' + ${v.claim.rawDoc.id}">doc#1</span>
        </div>
        <div class="claim-card-body">
          <div class="claim-card-text" th:text="${v.claim.textVi}">claim text</div>
          <div class="claim-cols">
            <div>
              <h4 th:text="#{ops.claims.colEvidence}">Evidence</h4>
              <div th:if="${#lists.isEmpty(v.citedFacts)}" style="font-size:var(--text-xs);color:var(--rose-600)" th:text="#{ops.claims.noneCited}">none cited</div>
              <div class="citation-block" th:each="f : ${v.citedFacts}" style="margin-bottom:8px">
                <div class="citation-head">
                  <span class="citation-lang" th:text="${f.spanLanguage.toUpperCase()}">VI</span>
                  <span class="citation-source" th:text="${f.factCode}">F-001</span>
                </div>
                <blockquote th:text="${f.spanText}">span</blockquote>
              </div>
            </div>
            <div>
              <div class="json-viewer">
                <div class="json-viewer-head"><span class="title" th:text="#{ops.claims.gateDetailTitle(${v.claim.claimCode})}">Gate detail</span><span class="toggle">Collapse</span></div>
                <pre th:text="${v.claim.gateDetailJson}">{}</pre>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/ops-session.js"></script>
<script src="/js/ops-sidebar.js"></script>
</body>
</html>
