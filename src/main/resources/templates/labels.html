<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
<meta charset="UTF-8"/>
<title th:text="#{ops.labels.title}">Label Log</title>
<link rel="stylesheet" href="/css/fonts.css"/>
<link rel="stylesheet" href="/css/colors.css"/>
<link rel="stylesheet" href="/css/typography.css"/>
<link rel="stylesheet" href="/css/spacing.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/patterns.css"/>
<link rel="stylesheet" href="/css/ops-components.css"/>
<link rel="stylesheet" href="/css/ops-sidebar.css"/>
<style>
  .old-text { text-decoration: line-through; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="ops-shell">
  <th:block th:replace="~{fragments/ops-sidebar :: sidebar('labels', ${queueCount})}"></th:block>
  <div class="ops-main">
    <div class="ops-content">
      <div class="page-header">
        <div>
          <h1 th:text="#{ops.labels.title}">Label Log</h1>
          <p th:text="#{ops.labels.description}">description</p>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(labels)}" class="empty-state">
        <div class="title">No review actions yet</div>
      </div>

      <div class="data-table-wrap" th:unless="${#lists.isEmpty(labels)}"><div class="data-table-scroll">
        <table class="data-table">
          <thead><tr>
            <th th:text="#{ops.labels.colWhen}">When</th>
            <th th:text="#{ops.labels.colCode}">Code</th>
            <th th:text="#{ops.labels.colAction}">Action</th>
            <th th:text="#{ops.labels.colReviewer}">Reviewer</th>
            <th th:text="#{ops.labels.colContext}">Context @ decision</th>
            <th th:text="#{ops.labels.colContent}">Content</th>
          </tr></thead>
          <tbody>
            <tr th:each="l : ${labels}">
              <td class="ts" th:text="${#temporals.format(l.createdAt.atZone(T(java.time.ZoneId).systemDefault()), 'dd/MM HH:mm')}">t</td>
              <td><span class="code-chip code-chip-sm" th:text="${l.claimCode}">C-001</span></td>
              <td>
                <span class="badge badge-sm"
                      th:classappend="${l.action.name() == 'APPROVE'} ? 'badge-success' : (${l.action.name() == 'EDIT_APPROVE'} ? 'badge-info' : (${l.action.name() == 'FORCE_APPROVE'} ? 'badge-override' : 'badge-danger'))"
                      th:text="${l.action}">APPROVE</span>
              </td>
              <td th:text="${l.reviewerName}">reviewer</td>
              <td style="font-size:var(--text-xs);color:var(--text-secondary)"
                  th:text="'L1=' + ${l.gateStatusAtDecision} + ' · L2=' + ${l.verdictAtDecision} + ' · ' + ${l.riskTierAtDecision}">ctx</td>
              <td style="font-size:var(--text-xs);color:var(--text-secondary);max-width:320px">
                <div th:if="${l.oldText != null}" class="old-text" th:text="${#strings.abbreviate(l.oldText, 100)}">old</div>
                <div th:if="${l.newText != null}" th:text="${#strings.abbreviate(l.newText, 100)}">new</div>
                <div th:if="${l.reason != null}" th:text="'Reason: ' + ${l.reason}">reason</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>
  </div>
</div>
<script src="/js/ops-session.js"></script>
<script src="/js/ops-sidebar.js"></script>
</body>
</html>
