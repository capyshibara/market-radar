<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><title th:text="${item.document.title + ' · Corpus'}">Corpus detail</title><link rel="stylesheet" href="/css/fonts.css"/><link rel="stylesheet" href="/css/colors.css"/><link rel="stylesheet" href="/css/typography.css"/><link rel="stylesheet" href="/css/spacing.css"/><link rel="stylesheet" href="/css/base.css"/><link rel="stylesheet" href="/css/patterns.css"/><link rel="stylesheet" href="/css/ops-components.css"/><link rel="stylesheet" href="/css/ops-sidebar.css"/><style>.detail-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}.panel{padding:22px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--surface-card);margin-bottom:18px}.metadata{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.metadata dt{font-size:10px;text-transform:uppercase;color:var(--text-secondary);letter-spacing:.06em}.metadata dd{margin:3px 0 0;color:var(--text-primary)}.full-text{white-space:pre-wrap;max-height:640px;overflow:auto;font-size:13px;line-height:1.65;background:var(--slate-50);padding:18px;border-radius:var(--radius-sm)}.record{padding:14px 0;border-top:1px solid var(--border-default)}.record:first-child{border-top:0}.record h3{font-size:15px;margin:0 0 7px}.record p{font-size:12px;margin:5px 0;color:var(--text-secondary)}.notice{padding:12px 14px;margin-bottom:16px;border-radius:var(--radius-sm)}.notice.ok{background:var(--green-50);color:var(--green-700)}.notice.err{background:var(--rose-50);color:var(--rose-700)}@media(max-width:960px){.detail-grid{grid-template-columns:1fr}}</style></head><body><div class="ops-shell"><th:block th:replace="~{fragments/ops-sidebar :: sidebar('corpus', ${null})}"></th:block><div class="ops-main"><div class="ops-content"><div class="page-header"><div><a href="/corpus" class="text-link" th:text="${#locale.language == 'vi' ? '← Kho dữ liệu' : '← Corpus Explorer'}">Back</a><h1 th:text="${item.document.title}">Title</h1><p th:text="${'#'+item.document.id+' · '+item.document.publisher+' · '+item.document.state}">Meta</p></div><div class="actions"><a th:if="${#strings.startsWith(item.document.url,'https://')}" class="btn btn-secondary" th:href="${item.document.url}" target="_blank" th:text="${#locale.language == 'vi' ? 'Mở nguồn gốc' : 'Open source'}">Open source</a><form method="post" th:action="${'/corpus/'+item.document.id+'/classify'}"><button class="btn btn-secondary" th:text="${#locale.language == 'vi' ? 'Phân loại tài liệu' : 'Classify document'}">Classify</button></form><form method="post" th:action="${'/corpus/'+item.document.id+'/extract'}"><button class="btn btn-primary" th:text="${#locale.language == 'vi' ? 'Trích xuất bằng chứng' : 'Extract evidence'}">Extract</button></form></div></div><p class="notice ok" th:if="${corpusSuccess}" th:text="${corpusSuccess}">Success</p><p class="notice err" th:if="${corpusError}" th:text="${corpusError}">Error</p>
<div class="detail-grid"><main><section class="panel"><h2 th:text="${#locale.language == 'vi' ? 'Toàn văn đã lưu' : 'Stored full text'}">Full text</h2><div class="full-text" th:text="${item.fullText}">Text</div></section></main><aside><section class="panel"><h2 th:text="${#locale.language == 'vi' ? 'Thông tin tài liệu' : 'Document metadata'}">Metadata</h2><dl class="metadata"><div><dt>ID</dt><dd th:text="${'#'+item.document.id}">#1</dd></div><div><dt th:text="${#locale.language == 'vi' ? 'Ngôn ngữ' : 'Language'}">Language</dt><dd th:text="${item.document.language}">en</dd></div><div><dt th:text="${#locale.language == 'vi' ? 'Phương thức' : 'Intake'}">Intake</dt><dd th:text="${item.document.intakeMethod}">FILE</dd></div><div><dt th:text="${#locale.language == 'vi' ? 'Ký tự' : 'Characters'}">Characters</dt><dd th:text="${item.document.textCharacters}">0</dd></div><div><dt th:text="${#locale.language == 'vi' ? 'Phân loại' : 'Classification'}">Classification</dt><dd th:text="${item.document.classificationStatus ?: 'NOT_RUN'}">NOT_RUN</dd></div><div><dt th:text="${#locale.language == 'vi' ? 'Phòng ban' : 'Departments'}">Departments</dt><dd th:text="${item.document.departments ?: '—'}">—</dd></div></dl></section><section class="panel"><h2 th:text="${#locale.language == 'vi' ? 'Bằng chứng đã trích xuất' : 'Extracted evidence'}">Evidence</h2><p th:if="${#lists.isEmpty(item.facts)}" th:text="${#locale.language == 'vi' ? 'Chưa có fact. Hãy phân loại trước, sau đó trích xuất.' : 'No facts yet. Classify first, then extract.'}">No facts</p><div class="record" th:each="fact:${item.facts}"><h3 th:text="${fact.code+' · '+fact.type}">Fact</h3><p th:text="${fact.evidence}">Evidence</p></div></section><section class="panel"><h2>Claims</h2><p th:if="${#lists.isEmpty(item.claims)}" th:text="${#locale.language == 'vi' ? 'Chưa có claim được diễn giải.' : 'No interpreted claims yet.'}">No claims</p><div class="record" th:each="claim:${item.claims}"><h3 th:text="${claim.code+' · '+claim.verdict}">Claim</h3><p th:text="${#locale.language == 'vi' ? claim.textVi : claim.textEn}">Claim text</p></div></section></aside></div></div></div></div><script src="/js/ops-session.js"></script><script src="/js/ops-sidebar.js"></script></body></html>
